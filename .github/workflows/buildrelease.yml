      - name: 08. Patch GL6_MOV.DAT
        shell: pwsh
        run: |
          Write-Host "`n[i] Copy GL6_MOV.DAT from the original files folder to the build folder"
          Copy-Item -Verbose -Path "$Env:GITHUB_WORKSPACE\build\05-original_files\GL6_MOV.DAT" -Destination "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV.DAT"

          Write-Host "`n[i] Create a new 05-build\GL6_MOV DAT folder"
          New-Item -ItemType Directory -Force -Verbose -Path "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV DAT"

          # Define the list of movie files to process
          $movieFiles = @(
            "00000005.MOVIE",
            "00000006.MOVIE",
            "00000007.MOVIE",
            "00000009.MOVIE",
            "00000010.MOVIE",
            "00000011.MOVIE",
            "00000012.MOVIE",
            "00000013.MOVIE",
            "00000014.MOVIE",
            "00000015.MOVIE",
            "00000016.MOVIE",
            "00000017.MOVIE",
            "00000018.MOVIE"
          )

          # Initialize an array to store debug info
          $debugInfo = @()

          Write-Host "`n[i] Start subtitle loop"
          foreach ($movie in $movieFiles) {
            $movieBase = [System.IO.Path]::GetFileNameWithoutExtension($movie)

            Write-Host "`n[i] Create movie dir"
            New-Item -ItemType Directory -Force -Verbose -Path "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase"

            Write-Host "`n[i] Demux $movie"
            cmd.exe /C "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ps2str\ps2str.exe" demux -video:0 -pcm:0 -d "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase" "$Env:GITHUB_WORKSPACE\build\05-original_files\GL6_MOV DAT\$movie"

            Write-Host "`n[i] Getting original bitrate using MediaInfo"
            $bitrate = & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\MediaInfo_CLI_26.01_Windows_x64\mediainfo.exe" --Inform="Video;%BitRate%" "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_video_0.m2v"
            $targetKbps = [int]([double]$bitrate / 1000)
            Write-Host "`n[i] Using original bitrate: $targetKbps kb/s ($bitrate)"

            Write-Host "`n[i] Add subtitles to ${movieBase}_video_0.m2v"
            cd "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase"
            Copy-Item -Verbose -Path "$Env:GITHUB_WORKSPACE\source\GL6_MOV.DAT\$movie.srt" -Destination "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\$movie.srt"
            cmd.exe /C "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ffmpeg-2026-02-09-git-9bfa1635ae-essentials_build\ffmpeg.exe" `
              -nostdin `
              -i "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_video_0.m2v" `
              -vf subtitles=$movie.srt `
              -c mpeg2video `
              -b:v "${targetKbps}k" `
              -minrate 4500k `
              -maxrate 15000k `
              -bufsize 1835008 `
              -s 640x448 `
              -g 18 `
              -bf 2 `
              -sc_threshold 1G `
              -pix_fmt yuv420p `
              -profile:v main `
              -level:v main `
              -color_primaries smpte170m `
              -color_trc smpte170m `
              -colorspace smpte170m `
              -inter_matrix 16,17,18,19,20,21,22,23,17,18,19,20,21,22,23,24,18,19,20,21,22,23,24,25,19,20,21,22,23,24,26,27,20,21,22,23,25,26,27,28,21,22,23,24,26,27,28,30,22,23,24,26,27,28,30,31,23,24,25,27,28,30,31,33 `
              -video_format ntsc `
              -f mpeg2video "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_subtitled.m2v"

            Write-Host "`n[i] Add missing MPEG-2 sequence end code 0x00 0x00 0x01 0xB7 at the end of ${movieBase}_subtitled.m2v"
            # Debug info for original video
            $origFile = "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_video_0.m2v"
            $origSize = (Get-Item $origFile).Length
            ($fs = [System.IO.File]::OpenRead($origFile)).Seek(-8, [System.IO.SeekOrigin]::End) | Out-Null
            $b = [byte[]]::new(8)
            $fs.Read($b, 0, 8) | Out-Null
            $origLastBytes = ($b | ForEach-Object { $_.ToString('X2') } | Join-String -Separator ' ')
            $fs.Close()
            $debugInfo += "[${movieBase}] Original Video: Size = $origSize bytes | Last 8 bytes = $origLastBytes"

            # Append the MPEG_program_end_code/sequence end code 0x00 00 01 B7
            $reencodedFile = "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_subtitled.m2v"
            ($fs = [System.IO.File]::OpenWrite($reencodedFile)).Seek(-4, [System.IO.SeekOrigin]::End) | Out-Null
            $fs.Write(([byte[]]@(0x00, 0x00, 0x01, 0xB7)), 0, 4)
            $fs.Close()

            # Debug info for reencoded video
            $reencodedSize = (Get-Item $reencodedFile).Length
            ($fs = [System.IO.File]::OpenRead($reencodedFile)).Seek(-8, [System.IO.SeekOrigin]::End) | Out-Null
            $b = [byte[]]::new(8)
            $fs.Read($b, 0, 8) | Out-Null
            $reencodedLastBytes = ($b | ForEach-Object { $_.ToString('X2') } | Join-String -Separator ' ')
            $fs.Close()
            $debugInfo += "[${movieBase}] Reencoded Video: Size = $reencodedSize bytes | Last 8 bytes = $reencodedLastBytes"

            Write-Host "`n[i] Create mux instruction file for $movie"
          @"
          pss
              stream video:0
                  input "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_subtitled.m2v"
              end
              stream pcm:0
                  input "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}_pcm_0.ads"
              end
          end
          "@ | Out-File -FilePath "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}.mux" -Encoding ascii

            Write-Host "`n[i] Mux back to $movie"
            cmd.exe /C "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ps2str\ps2str.exe" mux -o "$Env:GITHUB_WORKSPACE\build\05-build\$movieBase\${movieBase}.mux" "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV DAT\$movie"
          }

          # Print debug info at the end
          Write-Host "`n[i] Debug Information for Reencoded Videos"
          foreach ($info in $debugInfo) {
            Write-Host $info
          }

          Write-Host "`n[i] Patch MOV.DAT"
          cmd.exe /C "$Env:GITHUB_WORKSPACE\build\02-quickbms\quickbms.exe" -w -r -r "$Env:GITHUB_WORKSPACE\tools\GL5 and 6 quickBMS scripts\growlanser.bms" "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV.DAT" "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV DAT"

          Write-Host "`n[i] Move patched MOV.DAT"
          Move-Item -Verbose -Path "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV.DAT" -Destination "$Env:GITHUB_WORKSPACE\build\06-translates_files\GL6_MOV.DAT"

      - name: 08.1 Enhanced Diff Debug
        shell: pwsh
        run: |
          function Create-HtmlDiff {
            param([string]$OldFile, [string]$NewFile, [string]$OutFile, [string]$Title)

            if (-not (Test-Path $OldFile)) {
              Write-Host "ERROR $OldFile does not exist"
              return
            }

            if (-not (Test-Path $NewFile)) {
              Write-Host "ERROR $NewFile does not exist"
              return
            }

            $diff = Compare-Object (Get-Content $OldFile) (Get-Content $NewFile) -IncludeEqual

            $html = @"
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>$Title</title>
          <style>
            body{font-family:monospace;background:#f8fafc;margin:20px}
            table{width:100%;border-collapse:collapse}
            th,td{border:1px solid #ddd;padding:4px;vertical-align:top;white-space:pre-wrap}
            th{background:#eee}
            .line{width:50px;color:#666;text-align:right}
            .equal{background:#fff}
            .removed{background:#fee2e2}
            .added{background:#ecfdf5}
          </style>
          </head><body><h2>$Title</h2><table><tr><th class="line">Line</th><th>Original</th><th>New</th></tr>
          "@

            $i = 0

            foreach ($d in $diff) {
              $i++
              $t = [System.Web.HttpUtility]::HtmlEncode($d.InputObject)

              if ($d.SideIndicator -eq '==') {
                $html += "<tr><td class='line'>$i</td><td class='equal'>$t</td><td class='equal'>$t</td></tr>`n"
              }

              elseif ($d.SideIndicator -eq '<=') {
                $html += "<tr><td class='line'>$i</td><td class='removed'>$t</td><td></td></tr>`n"
              }

              else {
                $html += "<tr><td class='line'>$i</td><td></td><td class='added'>$t</td></tr>`n"
              }
            }

            $html += "</table></body></html>"
            $html | Out-File $OutFile -Encoding utf8
          }

          $movies = @(
            "00000005.MOVIE",
            "00000006.MOVIE",
            "00000007.MOVIE",
            "00000009.MOVIE",
            "00000010.MOVIE",
            "00000011.MOVIE",
            "00000012.MOVIE",
            "00000013.MOVIE",
            "00000014.MOVIE",
            "00000015.MOVIE",
            "00000016.MOVIE",
            "00000017.MOVIE",
            "00000018.MOVIE"
          )

          $debugDir = "$Env:GITHUB_WORKSPACE\build\debug_diff"
          New-Item -ItemType Directory -Force -Verbose -Path "$debugDir\html_diffs"

          foreach ($base in $movies) {
            Write-Host "`n[i] Diffing $base"

            $origMovie = "$Env:GITHUB_WORKSPACE\build\05-original_files\GL6_MOV DAT\$base"
            $newMovie  = "$Env:GITHUB_WORKSPACE\build\05-build\GL6_MOV DAT\$base"
            $origVideo = "$Env:GITHUB_WORKSPACE\build\05-build\$base\${base}_video_0.m2v"
            $newVideo  = "$Env:GITHUB_WORKSPACE\build\05-build\$base\${base}_subtitled.m2v"

            # === your dumps (copy-paste your original commands here) ===
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ffmpeg-2026-02-09-git-9bfa1635ae-essentials_build\ffprobe.exe" -hide_banner -show_streams -show_format -print_format json $origMovie | Out-File "$debugDir\ffprobe_orig_${base}.json"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ffmpeg-2026-02-09-git-9bfa1635ae-essentials_build\ffprobe.exe" -hide_banner -show_streams -show_format -print_format json $newMovie  | Out-File "$debugDir\ffprobe_new_${base}.json"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ffmpeg-2026-02-09-git-9bfa1635ae-essentials_build\ffprobe.exe" -hide_banner -show_streams -show_format -print_format json $origVideo | Out-File "$debugDir\ffprobe_orig_video_${base}.json"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ffmpeg-2026-02-09-git-9bfa1635ae-essentials_build\ffprobe.exe" -hide_banner -show_streams -show_format -print_format json $newVideo  | Out-File "$debugDir\ffprobe_new_video_${base}.json"

            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ps2str\ps2str.exe" info -v -pss $origMovie | Out-File "$debugDir\ps2str_orig_${base}.txt"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\ps2str\ps2str.exe" info -v -pss $newMovie  | Out-File "$debugDir\ps2str_new_${base}.txt"

            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\MediaInfo_CLI_26.01_Windows_x64\mediainfo.exe" -f $origMovie | Out-File "$debugDir\mediainfo_orig_${base}.txt"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\MediaInfo_CLI_26.01_Windows_x64\mediainfo.exe" -f $newMovie  | Out-File "$debugDir\mediainfo_new_${base}.txt"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\MediaInfo_CLI_26.01_Windows_x64\mediainfo.exe" -f $origVideo | Out-File "$debugDir\mediainfo_orig_video_${base}.txt"
            & "$Env:GITHUB_WORKSPACE\build\04-demuxmux\MediaInfo_CLI_26.01_Windows_x64\mediainfo.exe" -f $newVideo  | Out-File "$debugDir\mediainfo_new_video_${base}.txt"

            Write-Host "`n[i] Create HTML Diff for ffprobe"
            Create-HtmlDiff "$debugDir\ffprobe_orig_${base}.json" "$debugDir\ffprobe_new_${base}.json" "$debugDir\html_diffs\diff_ffprobe_${base}.html" "ffprobe Diff - $base"

            Write-Host "`n[i] Create HTML Diff for ps2str"
            Create-HtmlDiff "$debugDir\ps2str_orig_${base}.txt" "$debugDir\ps2str_new_${base}.txt" "$debugDir\html_diffs\diff_ps2str_${base}.html" "ps2str Diff - $base"

            Write-Host "`n[i] Create HTML Diff for mediainfo"
            Create-HtmlDiff "$debugDir\mediainfo_orig_${base}.txt" "$debugDir\mediainfo_new_${base}.txt" "$debugDir\html_diffs\diff_mediainfo_${base}.html" "mediainfo Diff - $base"

            Write-Host "`n[i] Done"
          }

