name: Find and Fix Duplicate Words Across [NLINE]

on: workflow_dispatch

permissions:
  contents: write
  pull-requests: write

jobs:
  FindAndFix:
    runs-on: windows-2025
    steps:
      - name: 01. Copy repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: | # Only copy specific folders to the container
            source

      - name: 02. Find and fix duplicate words across [NLINE]
        id: fix
        shell: pwsh # Powershell 7, which uses UTF-8 as default
        run: |
          Write-Host "`n[i] Initialize lists"
          $fixList = @()
          $totalFixed = 0

          Write-Host "`n[i] Create blackList"
          $blackList = @(
            '00000001.SCEN.asm',
            '00000002.SCEN Dummy file',
            '00000003.SCEN Dummy file',
            '00000033.SCEN Dummy file',
            '00000035.SCEN Dummy file',
            '00000039.SCEN Dummy file',
            '00000043.SCEN.asm',
            '00000061.SCEN Dummy file',
            '00000062.SCEN Dummy file',
            '00000064.SCEN Dummy file',
            '00000066.SCEN Dummy file',
            '00000067.SCEN Dummy file',
            '00000068.SCEN Dummy file',
            '00000071.SCEN Dummy file',
            '00000101.SCEC Dummy file',
            '00000105.SCEC Dummy file',
            '00000109.SCEC Voice check Debug overview',
            '00000110.SCEC Voice check Debug',
            '00000111.SCEC Voice check Debug',
            '00000112.SCEC Voice check Debug',
            '00000113.SCEC Voice check Debug',
            '00000114.SCEC Voice check Debug',
            '00000115.SCEC Voice check Debug',
            '00000116.SCEC Voice check Debug',
            '00000117.SCEC Voice check Debug',
            '00000118.SCEC Dummy file',
            '00000119.SCEC Dummy file',
            '00000120.SCEC Dummy file',
            '00000121.SCEC Dummy file',
            '00000122.SCEC Dummy file',
            '00000123.SCEC Dummy file',
            '00000124.SCEC Dummy file',
            '00000125.SCEC Dummy file',
            '00000167.STXT Dummy file'
          )

          Get-ChildItem -Path "$Env:GITHUB_WORKSPACE\source\GL6_SCEN.DAT" |
            Where-Object { $_.Name -notin $blackList } |
            ForEach-Object {

              $filename = $_.Name
              Write-Host "Checking $filename..." -NoNewline

              $fileLines = Get-Content -LiteralPath $_.FullName

              # Build list of non-comment translation lines and their original file indices
              $translationLines = [System.Collections.Generic.List[PSCustomObject]]::new()
              for ($idx = 0; $idx -lt $fileLines.Count; $idx++) {
                $line = $fileLines[$idx]
                if ($line -notlike '//*' -and $line -notlike '#*') {
                  $translationLines.Add([PSCustomObject]@{ Index = $idx; Text = $line })
                }
              }

              $modified = $false

              for ($i = 0; $i -lt ($translationLines.Count - 1); $i++) {
                $currentLine = $translationLines[$i].Text
                $nextItem    = $translationLines[$i + 1]
                $nextLine    = $nextItem.Text

                # Extract the last alphabetic word before [NLINE] on the current line,
                # allowing optional control codes (e.g. [COL01]) between word and [NLINE]
                if ($currentLine -match '([a-zA-Z]+)(?:\[[^\]]+\])*\[NLINE\]$') {
                  $lastWord = $matches[1]
                  $escaped  = [regex]::Escape($lastWord)

                  # Check if the next line starts with that same word (case-insensitive),
                  # optionally preceded by control codes, followed by whitespace, [ or end-of-line
                  if ($nextLine -imatch "^(?:\[[^\]]+\])*$escaped(?:\s|\[|$)") {
                    $fixedLine = $nextLine -ireplace "^((?:\[[^\]]+\])*)$escaped\s*", '$1'

                    Write-Host "`n`e[33m[~] Duplicate '$lastWord' in $filename"
                    Write-Host "  Line $($translationLines[$i].Index + 1): '$currentLine'"
                    Write-Host "  Line $($nextItem.Index + 1): '$nextLine' -> '$fixedLine'"

                    # Update both the file lines array and the in-memory text for subsequent checks
                    $fileLines[$nextItem.Index] = $fixedLine
                    $nextItem.Text = $fixedLine

                    $fixList += "[~] $filename (line $($nextItem.Index + 1)) - Removed duplicate '$lastWord': '$nextLine' -> '$fixedLine'"
                    $modified = $true
                    $totalFixed++
                  }
                }
              }

              if ($modified) {
                $fileLines | Set-Content -LiteralPath $_.FullName -Encoding utf8
                Write-Host "✏️ Fixed"
              } else {
                Write-Host "✅"
              }
            }

          Write-Host "`n[i] Summary of fixes:"
          $fixList | ForEach-Object { Write-Host "  $_" }
          Write-Host "`n[i] Total fixes applied: $totalFixed"

          if ($totalFixed -gt 0) {
            Write-Host "`e[33m[~] Applied $totalFixed fix(es). A pull request will be created."
            "found_issues=true" | Out-File -Append -FilePath $Env:GITHUB_OUTPUT -Encoding utf8
          } else {
            Write-Host "`e[32m[i] No duplicate words found!"
            "found_issues=false" | Out-File -Append -FilePath $Env:GITHUB_OUTPUT -Encoding utf8
          }

      - name: 03. Create Pull Request
        if: steps.fix.outputs.found_issues == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          commit-message: "Fix duplicate words across [NLINE] boundaries"
          branch: fix/nline-duplicate-words
          title: "Fix duplicate words across [NLINE] boundaries"
          body: |
            Automated fix for duplicate words that appear at the end of one line and the start of the next, separated by an `[NLINE]` control code.

            **Example of the issue:**
            ```
            are scared for their lives because[NLINE]
            because of their actions?[NWIN]
            ```
            The duplicate word (`because`) was removed from the start of the second line.
